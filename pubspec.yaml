name: sonlite
description: "Application locale de musique avec téléchargement YouTube."
publish_to: 'none'
version: 1.0.9+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Base de données locale
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29

  # Lecture audio
  just_audio: ^0.9.44
  audio_service: ^0.18.16

  # Sélecteur de fichiers
  file_picker: ^8.3.7

  # Extraction metadata audio
  flutter_media_metadata: ^1.0.0+1


  # HTTP client
  dio: ^5.8.0+1

  # Stockage sécurisé (JWT, Phase 2)
  flutter_secure_storage: ^9.2.4

  # Utilitaires fichiers
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1

  # Galerie / crop d'images
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Waveform audio (éditeur)
  audio_waveforms: ^1.2.1


  # Persistance préférences légères
  shared_preferences: ^2.3.3

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # Génération de code Drift + Riverpod
  build_runner: ^2.4.15
  drift_dev: ^2.26.1
  riverpod_generator: ^2.6.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D0124"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
